spring.application.name=ms-security
spring.config.import=optional:file:.env[.properties],optional:file:functions/ms-security/.env[.properties]
spring.mongodb.database=${MONGODB_DATABASE:db_security}
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/db_security}
server.port=${SERVER_PORT:8081}
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env-before-prod}
jwt.expiration=${JWT_EXPIRATION:3600000}

# OAuth provider setup
auth.oauth.providers.microsoft.enabled=${OAUTH_MICROSOFT_ENABLED:true}
auth.oauth.providers.microsoft.client-id=${OAUTH_MICROSOFT_CLIENT_ID:}
auth.oauth.providers.microsoft.client-secret=${OAUTH_MICROSOFT_CLIENT_SECRET:}
auth.oauth.providers.microsoft.authorize-uri=${OAUTH_MICROSOFT_AUTHORIZE_URI:https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
auth.oauth.providers.microsoft.token-uri=${OAUTH_MICROSOFT_TOKEN_URI:https://login.microsoftonline.com/common/oauth2/v2.0/token}
auth.oauth.providers.microsoft.user-info-uri=${OAUTH_MICROSOFT_USER_INFO_URI:https://graph.microsoft.com/v1.0/me}
auth.oauth.providers.microsoft.redirect-uri=${OAUTH_MICROSOFT_REDIRECT_URI:http://localhost:8081/api/public/security/oauth2/microsoft/callback}
auth.oauth.providers.microsoft.scopes=${OAUTH_MICROSOFT_SCOPES:openid profile email User.Read}

auth.oauth.providers.google.enabled=${OAUTH_GOOGLE_ENABLED:false}
auth.oauth.providers.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
auth.oauth.providers.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
auth.oauth.providers.google.authorize-uri=${OAUTH_GOOGLE_AUTHORIZE_URI:}
auth.oauth.providers.google.token-uri=${OAUTH_GOOGLE_TOKEN_URI:}
auth.oauth.providers.google.user-info-uri=${OAUTH_GOOGLE_USER_INFO_URI:}
auth.oauth.providers.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:}
auth.oauth.providers.google.scopes=${OAUTH_GOOGLE_SCOPES:openid profile email}

auth.oauth.providers.github.enabled=${OAUTH_GITHUB_ENABLED:false}
auth.oauth.providers.github.client-id=${OAUTH_GITHUB_CLIENT_ID:}
auth.oauth.providers.github.client-secret=${OAUTH_GITHUB_CLIENT_SECRET:}
auth.oauth.providers.github.authorize-uri=${OAUTH_GITHUB_AUTHORIZE_URI:}
auth.oauth.providers.github.token-uri=${OAUTH_GITHUB_TOKEN_URI:}
auth.oauth.providers.github.user-info-uri=${OAUTH_GITHUB_USER_INFO_URI:}
auth.oauth.providers.github.redirect-uri=${OAUTH_GITHUB_REDIRECT_URI:}
auth.oauth.providers.github.scopes=${OAUTH_GITHUB_SCOPES:read:user user:email}