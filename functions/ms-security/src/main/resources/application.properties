spring.application.name=ms-security
spring.config.import=optional:file:.env[.properties],optional:file:functions/ms-security/.env[.properties]
spring.mongodb.database=${MONGODB_DATABASE:db_security}
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/db_security}
server.port=${SERVER_PORT:8081}
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env-before-prod}
jwt.expiration=${JWT_EXPIRATION:3600000}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}
admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:felipe2006.jm@gmail.com}
admin.bootstrap.name=${ADMIN_BOOTSTRAP_NAME:Felipe Admin}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:Admin#2026Segura}
admin.bootstrap.role-name=${ADMIN_BOOTSTRAP_ROLE_NAME:administrador}
security.authorization.enabled=${SECURITY_AUTHORIZATION_ENABLED:true}
security.recaptcha.enabled=${SECURITY_RECAPTCHA_ENABLED:true}
security.recaptcha.secret-key=${SECURITY_RECAPTCHA_SECRET_KEY:}
security.recaptcha.verify-url=${SECURITY_RECAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
security.recaptcha.score-threshold=${SECURITY_RECAPTCHA_SCORE_THRESHOLD:0.5}
security.otp.ttl-seconds=${SECURITY_OTP_TTL_SECONDS:300}
security.otp.max-attempts=${SECURITY_OTP_MAX_ATTEMPTS:3}
security.otp.resend-cooldown-seconds=${SECURITY_OTP_RESEND_COOLDOWN_SECONDS:30}
security.password-recovery.reset-url=${SECURITY_PASSWORD_RECOVERY_RESET_URL:http://localhost:5173/login}
security.password-recovery.generic-message=${SECURITY_PASSWORD_RECOVERY_GENERIC_MESSAGE:Si la cuenta existe, recibiras instrucciones para recuperar tu contraseĂ±a.}
security.password-recovery.rate-limit-max-requests=${SECURITY_PASSWORD_RECOVERY_RATE_LIMIT_MAX_REQUESTS:5}
security.password-recovery.rate-limit-window-seconds=${SECURITY_PASSWORD_RECOVERY_RATE_LIMIT_WINDOW_SECONDS:300}
app.email.from=${APP_EMAIL_FROM:no-reply@busesinteligentes.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
