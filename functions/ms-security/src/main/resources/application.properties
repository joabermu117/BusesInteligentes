spring.application.name=ms-security
spring.config.import=optional:file:.env[.properties],optional:file:functions/ms-security/.env[.properties]
spring.mongodb.database=${MONGODB_DATABASE:db_security}
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/db_security}
server.port=${SERVER_PORT:8081}
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env-before-prod}
jwt.expiration=${JWT_EXPIRATION:3600000}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}
admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:felipe2006.jm@gmail.com}
admin.bootstrap.name=${ADMIN_BOOTSTRAP_NAME:Felipe Admin}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:Admin#2026Segura}
admin.bootstrap.role-name=${ADMIN_BOOTSTRAP_ROLE_NAME:administrador}
security.authorization.enabled=${SECURITY_AUTHORIZATION_ENABLED:true}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@buses-inteligentes.local}}
